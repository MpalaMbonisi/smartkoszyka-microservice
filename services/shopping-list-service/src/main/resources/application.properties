# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=shopping-list-service
server.port=8083

# ── Database ───────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:smartkoszyka}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Service-to-service URLs ───────────────────────────────────────────────────
# In Docker Compose this resolves to the product-service container.
# Locally (without Compose) point this at localhost:8082.
services.product-service.url=http://product-service:8082

# ── Actuator ───────────────────────────────────────────────────────────────────
management.server.port=9083
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.service=shopping-list-service

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.github.mpalambonisi=DEBUG
logging.level.org.springframework.security=WARN
