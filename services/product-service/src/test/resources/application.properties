# ── JWT — test values only, never use these in production ────────────────────
# Generate a valid base64 key of sufficient length (256-bit minimum for HS256)
jwt.secret.key=XHMpjwcYRX+rPNnLpWXzooeOyUu6TwzOz4sayPrzAbM=
jwt.expiration.ms=3600000

# ── Database — overridden by @DynamicPropertySource in each test class ────────
# These values are placeholders; Testcontainers replaces them at runtime
spring.datasource.url=jdbc:postgresql://localhost:5432/testdb
spring.datasource.username=test
spring.datasource.password=test
spring.jpa.hibernate.ddl-auto=create-drop

# ── Reduce noise in test logs ─────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.github.mpalambonisi=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=DEBUG

# ── Management port — keep simple for tests ───────────────────────────────────
management.endpoints.web.exposure.include=health
