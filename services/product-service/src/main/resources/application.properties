# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=product-service
server.port=8082

# ── Database ───────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:smartkoszyka}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.secret.key=${JWT_SECRET_KEY}
jwt.expiration.ms=3600000

# ── Actuator ───────────────────────────────────────────────────────────────────
management.server.port=9082
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.service=product-service

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.github.mpalambonisi=DEBUG
logging.level.org.springframework.security=WARN

# ── Scraper Service ────────────────────────────────────────────────────────────────────
scraper.run-on-startup=true
scraper.timezone=Europe/Warsaw
