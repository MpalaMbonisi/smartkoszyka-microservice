spring.application.name=api-gateway
server.port=8080

# ── Management ────────────────────────────────────────────────────────────────
management.server.port=9080
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# ── JWT (same secret as other services — must match) ─────────────────────────
jwt.secret.key=${JWT_SECRET_KEY}
jwt.expiration.ms=3600000

# ── Routes ────────────────────────────────────────────────────────────────────
# IMPORTANT: Routes are matched in order, so more specific routes should be defined before more general ones.

# Rule of thumb for this project:
#   /auth/**             → auth-service        (no JWT — public)
#   /api/account/**      → auth-service        (JWT required)
#   /api/shopping-lists/** → shopping-list-service (JWT required)
#   /api/products/**     → product-service     (JWT required)
#   /api/categories/**   → product-service     (JWT required)

# ─────────────────────────────────────────────────────────────────────────────

# Route 0: auth-service — public, no JWT filter
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://auth-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# Route 1: auth-service account management — protected
spring.cloud.gateway.routes[1].id=auth-service-account
spring.cloud.gateway.routes[1].uri=http://auth-service:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/account/**
spring.cloud.gateway.routes[1].filters[0]=JwtAuthenticationGatewayFilter

# Route 2: shopping-list-service — must come BEFORE the broad /api/** product routes
# because Spring Cloud Gateway matches on first-wins and /api/** would swallow these
spring.cloud.gateway.routes[2].id=shopping-list-service
spring.cloud.gateway.routes[2].uri=http://shopping-list-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/shopping-lists/**
spring.cloud.gateway.routes[2].filters[0]=JwtAuthenticationGatewayFilter

# Route 3: product-service products
spring.cloud.gateway.routes[3].id=product-service-products
spring.cloud.gateway.routes[3].uri=http://product-service:8082
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/products/**
spring.cloud.gateway.routes[3].filters[0]=JwtAuthenticationGatewayFilter

# Route 4: product-service categories
spring.cloud.gateway.routes[4].id=product-service-categories
spring.cloud.gateway.routes[4].uri=http://product-service:8082
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/categories/**
spring.cloud.gateway.routes[4].filters[0]=JwtAuthenticationGatewayFilter


# ── CORS (centralised) ──────
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.github.mpalambonisi.gateway=DEBUG
