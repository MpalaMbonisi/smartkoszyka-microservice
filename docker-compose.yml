# ──────────────────────────────────────────────────────────────────────────────
# SmartKoszyka Microservices — Local Development Compose
#
# Usage:
#   docker-compose up -d              # start everything
#   docker-compose up -d db           # start only the database
#   docker-compose logs -f <service>  # tail logs
#   docker-compose down -v            # stop + delete volumes
#
# Environment:
#   Copy .env.example → .env and fill in secrets before starting.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ───

  db:
    image: postgres:15-alpine
    container_name: sk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-smartkoszyka}
      POSTGRES_USER:     ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    image: smartkoszyka/auth-service:latest
    container_name: sk-auth
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8081"
      - "9081:9081"  # management port for Prometheus
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:   prod
      SPRING_DATASOURCE_URL:    jdbc:postgresql://db:5432/${DB_NAME:-smartkoszyka}
      DB_USERNAME:              ${DB_USERNAME:-postgres}
      DB_PASSWORD:              ${DB_PASSWORD}
      JWT_SECRET_KEY:           ${JWT_SECRET_KEY}
    networks:
      - sk-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  product-service:
    image: smartkoszyka/product-service:latest
    container_name: sk-product
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    ports:
      - "8082:8082"
      - "9082:9082"  # management port for Prometheus
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL:  jdbc:postgresql://db:5432/${DB_NAME:-smartkoszyka}
      DB_USERNAME:            ${DB_USERNAME:-postgres}
      DB_PASSWORD:            ${DB_PASSWORD}
      JWT_SECRET_KEY:         ${JWT_SECRET_KEY}
    networks:
      - sk-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prometheus:
    image: prom/prometheus:latest
    container_name: sk-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sk-network

  grafana:
    image: grafana/grafana:latest
    container_name: sk-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - sk-network
    depends_on:
      - prometheus

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: sk-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"    # only the gateway is public
      - "9080:9080"    # management
    depends_on:
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    networks:
      - sk-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # shopping-list-service:
  #   image: smartkoszyka/shopping-list-service:latest
  #   container_name: sk-shopping-list
  #   restart: unless-stopped
  #   build:
  #     context: services/shopping-list-service
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8083:8083"
  #     - "9083:9083"  # management port for Prometheus
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     SPRING_PROFILES_ACTIVE: prod
  #     SPRING_DATASOURCE_URL:  jdbc:postgresql://db:5432/${DB_NAME:-smartkoszyka}
  #     DB_USERNAME:            ${DB_USERNAME:-postgres}
  #     DB_PASSWORD:            ${DB_PASSWORD}
  #     JWT_SECRET_KEY:         ${JWT_SECRET_KEY}
  #   networks:
  #     - sk-network

# ── Volumes ──
volumes:
  postgres_data:
    driver: local
  prometheus_data:
  grafana_data:

# ── Networks ──
networks:
  sk-network:
    driver: bridge
