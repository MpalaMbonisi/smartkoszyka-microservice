version: "3.8"

# ──────────────────────────────────────────────────────────────────────────────
# SmartKoszyka Microservices — Local Development Compose
#
# Usage:
#   docker-compose up -d              # start everything
#   docker-compose up -d db           # start only the database
#   docker-compose logs -f <service>  # tail logs
#   docker-compose down -v            # stop + delete volumes
#
# Environment:
#   Copy .env.example → .env and fill in secrets before starting.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ───

  db:
    image: postgres:15-alpine
    container_name: sk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-smartkoszyka}
      POSTGRES_USER:     ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    image: smartkoszyka/auth-service:latest
    container_name: sk-auth
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:   prod
      SPRING_DATASOURCE_URL:    jdbc:postgresql://db:5432/${DB_NAME:-smartkoszyka}
      DB_USERNAME:              ${DB_USERNAME:-postgres}
      DB_PASSWORD:              ${DB_PASSWORD}
      JWT_SECRET_KEY:           ${JWT_SECRET_KEY}
    networks:
      - sk-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  product-service:
    image: smartkoszyka/product-service:latest
    container_name: sk-product
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL:  jdbc:postgresql://db:5432/${DB_NAME:-smartkoszyka}
      DB_USERNAME:            ${DB_USERNAME:-postgres}
      DB_PASSWORD:            ${DB_PASSWORD}
      JWT_SECRET_KEY:         ${JWT_SECRET_KEY}
    networks:
      - sk-network

  # shopping-list-service:
