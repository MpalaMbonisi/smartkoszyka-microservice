name: SmartKoszyka Microservice CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Shared env
env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"
  MAVEN_OPTS: "-Xmx1g"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Build & Test
  #    Compiles all modules, runs unit + integration tests, uploads coverage.
  # ────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    # commit-lint is advisory; don't block build on push events

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw clean compile -T 1C


      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Maven Test Results
          path: "**/target/surefire-reports/*.xml"
          reporter: java-junit
          fail-on-error: true

      - name: Package (skip tests — already ran)
        run: ./mvnw package -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-jars
          path: "**/target/*.jar"
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Code Quality
  #    Checkstyle, SpotBugs, PMD  gate — runs with -P quality profile.
  # ────────────────────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run quality gates (Checkstyle + SpotBugs + PMD)
        run: ./mvnw verify -P quality -DskipTests=false

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-reports
          path: "**/target/spotbugs/*.xml"
          retention-days: 7

      - name: Upload PMD report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-reports
          path: "**/target/pmd/*.xml"
          retention-days: 7
